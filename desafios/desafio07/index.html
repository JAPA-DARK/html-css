<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagens flexiveis</title>
    <style>
        body {
            background-image: linear-gradient(to right , blue
            gray);
        }
    </style>
</head>
<body>
    <h1>imagem flexivel</h1>
    <p>voce esta vendo a imagem completa? expermimente ampliar o tamanho da sua janela para aproveitar a melhor experiência </p>
    <picture>
        <source media="(max-width:200px )" srcset="imagem/imagem200.jpg" type="image/jpg">
        <source media="(max-width:750px )" srcset="imagem/imagem750.jpg" type="image/">
        <source media="(max-width: 1050px )" srcset="imagem/imagem1050.jpg" type="image/jpg">
        <img src="imagem/imagem.jpg" alt="imagem flexivel">
    </picture>
</picture>
</body>
</html>
